        <title>Projects | Evans Amos</title>
        <script>
            (() => {
                const preference = localStorage.getItem('theme-preference') || 'system';
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = preference === 'system' ? (prefersDark ? 'dark' : 'light') : preference;
                document.documentElement.dataset.theme = theme;
                document.documentElement.dataset.themePreference = preference;
            })();
        </script>
        <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">

            </nav>
            <div class="theme-switcher">
                <i class="bx bx-palette" aria-hidden="true"></i>
                <select class="theme-select" aria-label="Select color theme">
                    <option value="system">System</option>
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
